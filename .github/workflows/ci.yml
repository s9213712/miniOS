name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      QEMU_TIMEOUT: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            binutils \
            make \
            nasm \
            xorriso \
            qemu-system-x86 \
            git \
            curl \
            wget

      - name: Validate setup
        run: ./scripts/setup-dev.sh

      - name: Prepare local Limine cache
        run: |
          mkdir -p "${RUNNER_TEMP}/miniOS-limine"
          echo "LIMINE_CACHE_DIR=${RUNNER_TEMP}/miniOS-limine" >> "$GITHUB_ENV"

      - name: Build check (no boot)
        run: SKIP_SMOKE_RUN=1 make test-smoke

      - name: Boot smoke check (retry if flaky)
        run: |
          mkdir -p "${RUNNER_TEMP}/miniOS-smoke-logs"
          ATTEMPTS=0
          until [ "$ATTEMPTS" -ge 2 ]; do
            ATTEMPTS=$((ATTEMPTS + 1))
            echo "[ci] boot smoke attempt $ATTEMPTS/2"
            if SMOKE_KEEP_LOGS=1 TEST_SMOKE_LOG_DIR="${RUNNER_TEMP}/miniOS-smoke-logs" TEST_SMOKE_BASENAME="attempt-${ATTEMPTS}" make test-smoke; then
              exit 0
            fi
            echo "[ci] boot smoke failed on attempt $ATTEMPTS"
            if [ "$ATTEMPTS" -lt 2 ]; then
              sleep 2
            fi
          done
          echo "[ci] boot smoke failed after $ATTEMPTS attempts." >&2
          exit 1

      - name: Upload smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: miniOS-smoke-logs
          path: ${{ runner.temp }}/miniOS-smoke-logs
          if-no-files-found: warn
